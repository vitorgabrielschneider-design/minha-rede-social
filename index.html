<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTGUIA | Official App</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            --primary: #0095f6;
            --bg: #ffffff;
            --secondary-bg: #f8f9fa;
            --text: #1a1a1a;
            --text-secondary: #6e6e6e;
            --border: #efefef;
            --insta-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --safe-area-top: env(safe-area-inset-top);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: var(--text); display: flex; justify-content: center; height: 100vh; }

        .app-container {
            width: 100%; max-width: 430px; height: 100vh; background: var(--bg);
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        /* Header */
        header {
            height: 60px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); background: #fff; z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1.5px; background: var(--insta-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions { display: flex; gap: 20px; }

        /* Navigation Views */
        .view { display: none; height: 100%; overflow-y: auto; scrollbar-width: none; }
        .view::-webkit-scrollbar { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Stories - Compact Style */
        .stories-strip { display: flex; gap: 12px; padding: 12px 16px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .story-circle { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 66px; cursor: pointer; }
        .ring { width: 62px; height: 62px; border-radius: 50%; background: var(--insta-gradient); padding: 2px; display: flex; align-items: center; justify-content: center; }
        .avatar-wrap { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #fff; overflow: hidden; }
        .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .story-name { font-size: 11px; font-weight: 500; color: var(--text-secondary); width: 60px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Feed Post */
        .post { border-bottom: 8px solid var(--secondary-bg); }
        .post-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .mini-avatar { width: 32px; height: 32px; border-radius: 50%; background: #eee; overflow: hidden; }
        .mini-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .username { font-size: 14px; font-weight: 600; }
        .post-media { width: 100%; aspect-ratio: 1/1; background: #f0f0f0; overflow: hidden; }
        .post-media img { width: 100%; height: 100%; object-fit: cover; }
        .post-actions { display: flex; padding: 12px 16px; gap: 18px; }
        .action-icon { cursor: pointer; transition: transform 0.1s; }
        .action-icon:active { transform: scale(1.2); }
        .post-details { padding: 0 16px 16px; font-size: 14px; }
        .likes { font-weight: 700; margin-bottom: 4px; display: block; }

        /* Chat System */
        .chat-view { background: #fff; z-index: 2000; }
        .chat-list-item { display: flex; align-items: center; padding: 12px 16px; gap: 12px; cursor: pointer; transition: background 0.2s; }
        .chat-list-item:active { background: var(--secondary-bg); }
        .chat-info { flex: 1; }
        .chat-info h4 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
        .chat-info p { font-size: 13px; color: var(--text-secondary); }

        .chat-room { position: fixed; inset: 0; background: #fff; z-index: 3000; display: none; flex-direction: column; max-width: 430px; margin: 0 auto; }
        .chat-room-header { height: 60px; padding: 0 16px; display: flex; align-items: center; border-bottom: 1px solid var(--border); gap: 15px; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { padding: 10px 16px; border-radius: 20px; max-width: 75%; font-size: 14px; line-height: 1.4; }
        .msg-sent { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .msg-received { align-self: flex-start; background: var(--secondary-bg); color: var(--text); border-bottom-left-radius: 4px; }
        .chat-input-bar { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
        .chat-input { flex: 1; background: var(--secondary-bg); border: none; padding: 10px 16px; border-radius: 20px; outline: none; font-size: 14px; }

        /* Bottom Nav */
        nav { height: 60px; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; background: #fff; }
        .nav-item { color: var(--text-secondary); cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--text); }

        /* Utility */
        .hidden { display: none !important; }
        .red { color: #ed4956 !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header id="main-header">
            <div class="logo">VTGUIA</div>
            <div class="header-actions">
                <i data-lucide="plus-square" class="action-icon" onclick="openPostModal()"></i>
                <i data-lucide="message-circle" class="action-icon" onclick="switchView('chat')"></i>
            </div>
        </header>

        <!-- Main Content -->
        <main id="viewport">
            <!-- HOME VIEW -->
            <section id="view-home" class="view active">
                <div class="stories-strip" id="stories-bar">
                    <!-- Compact Stories -->
                </div>
                <div id="feed">
                    <!-- Feed Posts -->
                </div>
            </section>

            <!-- CHAT VIEW -->
            <section id="view-chat" class="view">
                <div style="padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px;">
                    <i data-lucide="arrow-left" onclick="switchView('home')" style="cursor:pointer;"></i>
                    <h2 style="font-size: 18px; font-weight: 700;">Mensagens</h2>
                </div>
                <div id="chat-list-container">
                    <!-- Chats -->
                </div>
            </section>

            <!-- PROFILE VIEW -->
            <section id="view-profile" class="view">
                <div style="padding: 24px 16px;">
                    <div style="display: flex; align-items: center; gap: 30px; margin-bottom: 20px;">
                        <div id="my-pic" style="width: 86px; height: 86px; border-radius: 50%; background: #eee; overflow: hidden; border: 1px solid var(--border);"></div>
                        <div style="flex: 1; display: flex; justify-content: space-around; text-align: center;">
                            <div><strong style="display:block; font-size:18px;">0</strong><span style="font-size:12px; color:var(--text-secondary);">posts</span></div>
                            <div><strong style="display:block; font-size:18px;">1.2k</strong><span style="font-size:12px; color:var(--text-secondary);">seguidores</span></div>
                            <div><strong style="display:block; font-size:18px;">450</strong><span style="font-size:12px; color:var(--text-secondary);">seguindo</span></div>
                        </div>
                    </div>
                    <h3 id="my-name" style="font-size: 15px; font-weight: 700;">Vitor Gabriel</h3>
                    <p style="font-size: 14px; color: var(--text-secondary); margin-top: 4px;">Bem-vindo ao VTGUIA Oficial 🚀</p>
                </div>
                <div id="my-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;"></div>
            </section>
        </main>

        <!-- Navigation -->
        <nav>
            <div class="nav-item active" onclick="switchView('home')"><i data-lucide="home"></i></div>
            <div class="nav-item" onclick="switchView('reels')"><i data-lucide="clapperboard"></i></div>
            <div class="nav-item" onclick="switchView('profile')"><i data-lucide="user"></i></div>
        </nav>

        <!-- Chat Room (Modal) -->
        <div id="chat-room" class="chat-room">
            <div class="chat-room-header">
                <i data-lucide="arrow-left" onclick="closeChatRoom()" style="cursor:pointer;"></i>
                <div class="mini-avatar" id="room-avatar"></div>
                <strong id="room-name"></strong>
            </div>
            <div class="messages-area" id="messages-area"></div>
            <div class="chat-input-bar">
                <input type="text" id="chat-input-field" class="chat-input" placeholder="Mensagem...">
                <i data-lucide="send" class="action-icon" style="color:var(--primary);" onclick="sendMsg()"></i>
            </div>
        </div>

        <!-- Auth (Simulated) -->
        <div id="auth" style="position:fixed; inset:0; background:#fff; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px;">
            <h1 class="logo" style="font-size:48px; margin-bottom:40px;">VTGUIA</h1>
            <input type="text" id="login-name" style="width:100%; padding:14px; border:1px solid var(--border); border-radius:12px; margin-bottom:15px; outline:none;" placeholder="Nome de usuário">
            <button onclick="doLogin()" style="width:100%; padding:14px; background:var(--primary); color:#fff; border:none; border-radius:12px; font-weight:700; cursor:pointer;">Entrar</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let me = { name: '', pic: 'https://ui-avatars.com/api/?background=random' };
        let activeChatUser = null;

        const users = [
            { id: 1, name: 'Ana Clara', pic: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150', lastMsg: 'Tudo bem por aí?' },
            { id: 2, name: 'Marcos Dev', pic: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150', lastMsg: 'O código está pronto!' },
            { id: 3, name: 'IA Influencer', pic: 'https://images.unsplash.com/photo-1675426513824-7b7b9c7355ac?w=150', lastMsg: 'Vi seu post novo!' }
        ];

        function doLogin() {
            const name = document.getElementById('login-name').value;
            if(!name) return;
            me.name = name;
            document.getElementById('auth').style.display = 'none';
            document.getElementById('my-name').innerText = name;
            document.getElementById('my-pic').innerHTML = `<img src="${me.pic}&name=${name}">`;
            init();
        }

        function init() {
            renderStories();
            renderFeed();
            renderChatList();
        }

        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelector(`.nav-item[onclick*="${view}"]`).classList.add('active');
            document.getElementById('main-header').style.display = (view === 'chat') ? 'none' : 'flex';
        }

        function renderStories() {
            const bar = document.getElementById('stories-bar');
            bar.innerHTML = `<div class="story-circle"><div class="ring" style="background:#eee;"><div class="avatar-wrap"><img src="${me.pic}&name=${me.name}"></div></div><span class="story-name">Seu story</span></div>`;
            users.forEach(u => {
                bar.innerHTML += `
                    <div class="story-circle">
                        <div class="ring"><div class="avatar-wrap"><img src="${u.pic}"></div></div>
                        <span class="story-name">${u.name}</span>
                    </div>
                `;
            });
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            users.forEach(u => {
                feed.innerHTML += `
                    <div class="post">
                        <div class="post-header">
                            <div class="user-info"><div class="mini-avatar"><img src="${u.pic}"></div><span class="username">${u.name}</span></div>
                            <i data-lucide="more-horizontal"></i>
                        </div>
                        <div class="post-media"><img src="https://picsum.photos/600/600?random=${u.id}"></div>
                        <div class="post-actions">
                            <i data-lucide="heart" class="action-icon" onclick="this.classList.toggle('red')"></i>
                            <i data-lucide="message-circle" class="action-icon"></i>
                            <i data-lucide="send" class="action-icon"></i>
                        </div>
                        <div class="post-details"><strong class="likes">1.234 curtidas</strong><p><strong>${u.name}</strong> Nova atualização do VTGUIA! ✨</p></div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function renderChatList() {
            const container = document.getElementById('chat-list-container');
            users.forEach(u => {
                container.innerHTML += `
                    <div class="chat-list-item" onclick="openChatRoom(${u.id})">
                        <div class="mini-avatar" style="width:56px; height:56px;"><img src="${u.pic}"></div>
                        <div class="chat-info">
                            <h4>${u.name}</h4>
                            <p>${u.lastMsg}</p>
                        </div>
                        <i data-lucide="camera" style="color:var(--text-secondary); width:20px;"></i>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function openChatRoom(userId) {
            const user = users.find(u => u.id === userId);
            activeChatUser = user;
            document.getElementById('room-name').innerText = user.name;
            document.getElementById('room-avatar').innerHTML = `<img src="${user.pic}">`;
            document.getElementById('chat-room').style.display = 'flex';
            document.getElementById('messages-area').innerHTML = `<div class="msg-bubble msg-received">${user.lastMsg}</div>`;
        }

        function closeChatRoom() {
            document.getElementById('chat-room').style.display = 'none';
        }

        function sendMsg() {
            const input = document.getElementById('chat-input-field');
            if(!input.value) return;
            const area = document.getElementById('messages-area');
            area.innerHTML += `<div class="msg-bubble msg-sent">${input.value}</div>`;
            input.value = '';
            area.scrollTop = area.scrollHeight;
        }
    </script>
</body>
</html>
