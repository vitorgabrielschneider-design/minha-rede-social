<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTGUIA - Social AI</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #262626;
            --secondary-text: #8e8e8e;
            --border: #dbdbdb;
            --blue: #0095f6;
            --red: #ed4956;
            --insta-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body { background-color: #fafafa; display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        .app-container {
            width: 100%; max-width: 450px; height: 100vh; background: var(--bg);
            display: flex; flex-direction: column; position: relative;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* Auth Screen */
        #auth-screen {
            position: absolute; inset: 0; background: #fff; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px;
        }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 5px; background: #fafafa; }
        .auth-btn { width: 100%; padding: 12px; background: var(--blue); color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

        header {
            height: 60px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; background: #fff; z-index: 100;
        }
        .logo { font-size: 24px; font-weight: bold; font-family: 'Arial Black', sans-serif; letter-spacing: -1px; }

        main { flex: 1; overflow-y: auto; scrollbar-width: none; position: relative; }
        main::-webkit-scrollbar { display: none; }

        .section { display: none; }
        .section.active { display: block; }

        /* Stories Bar */
        .stories-bar { display: flex; padding: 12px 8px; gap: 12px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; min-width: 75px; cursor: pointer; }
        .story-ring { width: 66px; height: 66px; border-radius: 50%; background: var(--insta-gradient); padding: 2px; display: flex; justify-content: center; align-items: center; }
        .story-avatar { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #fff; background-size: cover; background-position: center; }
        .story-name { font-size: 11px; margin-top: 4px; color: var(--text); }

        /* Story Viewer */
        #story-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: none; flex-direction: column;
        }
        .story-progress-container { position: absolute; top: 10px; left: 0; width: 100%; display: flex; gap: 5px; padding: 0 10px; }
        .story-progress-bar { height: 2px; background: rgba(255,255,255,0.3); flex: 1; border-radius: 1px; overflow: hidden; }
        .story-progress-fill { height: 100%; background: #fff; width: 0%; }
        
        .story-header { position: absolute; top: 25px; left: 15px; display: flex; align-items: center; gap: 10px; color: #fff; z-index: 10; width: calc(100% - 30px); }
        .story-header-user { display: flex; align-items: center; gap: 8px; flex: 1; }
        .story-header-avatar { width: 32px; height: 32px; border-radius: 50%; background-size: cover; border: 1px solid rgba(255,255,255,0.2); }
        
        .story-content { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .story-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* Touch areas for next/prev */
        .story-touch { position: absolute; top: 0; height: 100%; width: 50%; z-index: 5; }
        .story-touch-left { left: 0; }
        .story-touch-right { right: 0; }

        .story-footer { padding: 20px; display: flex; align-items: center; gap: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.5)); position: absolute; bottom: 0; width: 100%; }
        .story-input { flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.5); border-radius: 25px; padding: 10px 20px; color: #fff; outline: none; }
        .story-like-btn { font-size: 28px; color: #fff; cursor: pointer; transition: transform 0.1s; }
        .story-like-btn.liked { color: var(--red); transform: scale(1.1); }

        /* Feed */
        .post { border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .post-header { display: flex; align-items: center; padding: 12px; gap: 10px; }
        .post-avatar { width: 32px; height: 32px; border-radius: 50%; background-size: cover; }
        .post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .post-actions { padding: 12px; display: flex; gap: 16px; font-size: 24px; }

        /* Reels */
        .reels-container { height: 100%; background: #000; overflow-y: scroll; snap-type: y mandatory; }
        .reel-item { height: 100%; width: 100%; snap-align: start; position: relative; }
        .reel-video { width: 100%; height: 100%; object-fit: cover; }
        .reel-overlay { position: absolute; bottom: 20px; left: 15px; color: #fff; z-index: 5; }

        /* Nav */
        nav { height: 50px; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; background: #fff; }
        .nav-icon { font-size: 24px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Auth -->
        <div id="auth-screen">
            <h1 style="margin-bottom: 30px; font-family: 'Arial Black';">VTGUIA</h1>
            <input type="text" id="username-input" class="auth-input" placeholder="Nome de usuário">
            <input type="file" id="profile-upload" class="hidden" accept="image/*">
            <button onclick="document.getElementById('profile-upload').click()" class="auth-btn" style="background: #eee; color: #333; margin-bottom: 10px;">Escolher Foto de Perfil</button>
            <button onclick="login()" class="auth-btn">Entrar</button>
        </div>

        <header>
            <div class="logo">VTGUIA</div>
            <div style="font-size: 24px; cursor: pointer;" onclick="openUpload()">➕</div>
        </header>

        <main>
            <section id="sec-home" class="section active">
                <div class="stories-bar" id="stories-container"></div>
                <div id="feed-container"></div>
            </section>
            <section id="sec-reels" class="section">
                <div class="reels-container" id="reels-container"></div>
            </section>
            <section id="sec-profile" class="section">
                <div style="padding: 20px; display: flex; align-items: center; gap: 20px;">
                    <div id="my-profile-pic" style="width: 80px; height: 80px; border-radius: 50%; background-size: cover; border: 1px solid var(--border);"></div>
                    <h3 id="display-username"></h3>
                </div>
                <div class="profile-grid" id="my-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;"></div>
            </section>
        </main>

        <nav>
            <div onclick="showSection('home')" class="nav-icon">🏠</div>
            <div onclick="showSection('reels')" class="nav-icon">🎞️</div>
            <div onclick="showSection('profile')" class="nav-icon">👤</div>
        </nav>

        <!-- Story Viewer -->
        <div id="story-viewer">
            <div class="story-progress-container" id="story-progress-container"></div>
            <div class="story-header">
                <div class="story-header-user">
                    <div class="story-header-avatar" id="story-header-avatar"></div>
                    <strong id="story-header-name"></strong>
                </div>
                <span style="cursor: pointer; font-size: 24px;" onclick="closeStory()">✕</span>
            </div>
            <div class="story-content">
                <div class="story-touch story-touch-left" onclick="prevStory()"></div>
                <div class="story-touch story-touch-right" onclick="nextStory()"></div>
                <img id="story-img" class="story-img" src="">
            </div>
            <div class="story-footer">
                <input type="text" class="story-input" placeholder="Enviar mensagem...">
                <span class="story-like-btn" id="story-like-icon" onclick="toggleStoryLike()">❤️</span>
            </div>
        </div>

        <!-- Upload Modal -->
        <div id="upload-modal" class="hidden" style="position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px;">
            <div style="background: #fff; width: 100%; border-radius: 12px; padding: 20px;">
                <h3>Novo Post</h3>
                <input type="file" id="post-file" accept="image/*" style="margin: 20px 0;">
                <textarea id="post-caption" class="auth-input" placeholder="Legenda..."></textarea>
                <button onclick="publishPost()" class="auth-btn">Publicar</button>
                <button onclick="closeUpload()" class="auth-btn" style="background: #eee; color: #333; margin-top: 10px;">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = { name: '', pic: '' };
        let myPosts = [];
        let currentStoryIndex = 0;
        let storyInterval;
        let storyProgress = 0;

        const storiesData = [
            { name: 'IA_Artist', img: 'https://images.unsplash.com/photo-1675426513824-7b7b9c7355ac?w=400', liked: false },
            { name: 'Cyber_Girl', img: 'https://images.unsplash.com/photo-1614728263952-84ea206f99b6?w=400', liked: false },
            { name: 'Vitor_Design', img: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400', liked: false },
            { name: 'Nature_IA', img: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400', liked: false }
        ];

        function login() {
            const name = document.getElementById('username-input').value;
            const picInput = document.getElementById('profile-upload');
            if (!name) return alert('Digite um nome!');
            currentUser.name = name;
            if (picInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { currentUser.pic = e.target.result; startApp(); };
                reader.readAsDataURL(picInput.files[0]);
            } else {
                currentUser.pic = 'https://via.placeholder.com/150';
                startApp();
            }
        }

        function startApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('display-username').innerText = currentUser.name;
            document.getElementById('my-profile-pic').style.backgroundImage = `url(${currentUser.pic})`;
            renderStoriesBar();
            renderReels();
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
        }

        function renderStoriesBar() {
            const container = document.getElementById('stories-container');
            container.innerHTML = `<div class="story-item"><div class="story-ring" style="background:#eee"><div class="story-avatar" style="background-image:url(${currentUser.pic})"></div></div><span class="story-name">Seu story</span></div>`;
            storiesData.forEach((s, index) => {
                container.innerHTML += `<div class="story-item" onclick="openStory(${index})"><div class="story-ring"><div class="story-avatar" style="background-image:url(${s.img})"></div></div><span class="story-name">${s.name}</span></div>`;
            });
        }

        function openStory(index) {
            currentStoryIndex = index;
            document.getElementById('story-viewer').style.display = 'flex';
            renderStoryProgressBars();
            loadStory(index);
        }

        function renderStoryProgressBars() {
            const container = document.getElementById('story-progress-container');
            container.innerHTML = '';
            storiesData.forEach((_, i) => {
                const bar = document.createElement('div');
                bar.className = 'story-progress-bar';
                bar.innerHTML = `<div class="story-progress-fill" id="fill-${i}" style="width: ${i < currentStoryIndex ? '100%' : '0%'}"></div>`;
                container.appendChild(bar);
            });
        }

        function loadStory(index) {
            clearInterval(storyInterval);
            const story = storiesData[index];
            document.getElementById('story-header-avatar').style.backgroundImage = `url(${story.img})`;
            document.getElementById('story-header-name').innerText = story.name;
            document.getElementById('story-img').src = story.img;
            document.getElementById('story-like-icon').className = story.liked ? 'story-like-btn liked' : 'story-like-btn';
            
            storyProgress = 0;
            const fill = document.getElementById(`fill-${index}`);
            storyInterval = setInterval(() => {
                storyProgress += 1;
                fill.style.width = storyProgress + '%';
                if (storyProgress >= 100) {
                    nextStory();
                }
            }, 30); // 3 seconds total
        }

        function nextStory() {
            if (currentStoryIndex < storiesData.length - 1) {
                currentStoryIndex++;
                renderStoryProgressBars();
                loadStory(currentStoryIndex);
            } else {
                closeStory();
            }
        }

        function prevStory() {
            if (currentStoryIndex > 0) {
                currentStoryIndex--;
                renderStoryProgressBars();
                loadStory(currentStoryIndex);
            } else {
                loadStory(0);
            }
        }

        function toggleStoryLike() {
            const story = storiesData[currentStoryIndex];
            story.liked = !story.liked;
            document.getElementById('story-like-icon').className = story.liked ? 'story-like-btn liked' : 'story-like-btn';
        }

        function closeStory() {
            document.getElementById('story-viewer').style.display = 'none';
            clearInterval(storyInterval);
        }

        function renderReels() {
            const container = document.getElementById('reels-container');
            const reels = [
                { user: 'ai_future', video: 'https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-futuristic-city-4412-large.mp4' },
                { user: 'cyber_nature', video: 'https://assets.mixkit.co/videos/preview/mixkit-forest-stream-in-the-sunlight-529-large.mp4' }
            ];
            reels.forEach(r => {
                container.innerHTML += `<div class="reel-item"><video class="reel-video" src="${r.video}" loop muted autoplay></video><div class="reel-overlay"><strong>@${r.user}</strong><p>Gerado por IA ✨</p></div></div>`;
            });
        }

        function openUpload() { document.getElementById('upload-modal').style.display = 'flex'; }
        function closeUpload() { document.getElementById('upload-modal').style.display = 'none'; }
        function publishPost() {
            const fileInput = document.getElementById('post-file');
            const caption = document.getElementById('post-caption').value;
            if (!fileInput.files[0]) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                myPosts.unshift({ img: e.target.result, caption });
                renderFeed();
                renderProfileGrid();
                closeUpload();
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        function renderFeed() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            myPosts.forEach(p => {
                container.innerHTML += `<div class="post"><div class="post-header"><div class="post-avatar" style="background-image:url(${currentUser.pic})"></div><strong>${currentUser.name}</strong></div><img src="${p.img}" class="post-img"><div class="post-actions">❤️ 💬 ✈️</div><div style="padding:0 12px 12px"><strong>${currentUser.name}</strong> ${p.caption}</div></div>`;
            });
        }

        function renderProfileGrid() {
            const container = document.getElementById('my-grid');
            container.innerHTML = '';
            myPosts.forEach(p => { container.innerHTML += `<div style="aspect-ratio:1/1; background-image:url(${p.img}); background-size:cover; background-position:center;"></div>`; });
        }
    </script>
</body>
</html>
