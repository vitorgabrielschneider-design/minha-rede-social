<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <style>
        /* Estilos CSS inspirados no Instagram */
        :root {
            --bg-color: #fafafa;
            --white: #ffffff;
            --border: #dbdbdb;
            --text-main: #262626;
            --text-secondary: #8e8e8e;
            --link-blue: #0095f6;
            --heart-red: #ed4956;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Navbar */
        nav {
            background-color: var(--white);
            border-bottom: 1px solid var(--border);
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-content {
            width: 100%;
            max-width: 935px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-family: 'Arial', sans-serif; /* Simulação da fonte cursiva */
            font-weight: bold;
            font-size: 24px;
            text-decoration: none;
            color: var(--text-main);
        }

        /* Container Principal */
        main {
            max-width: 600px;
            margin: 30px auto;
            padding: 0 10px;
        }

        /* Criar Postagem */
        .create-post {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .create-post h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px;
            resize: none;
            outline: none;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .btn-post {
            background-color: var(--link-blue);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 7px 16px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-post:disabled {
            opacity: 0.3;
            cursor: default;
        }

        /* Feed / Post */
        .post {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 3px;
            margin-bottom: 24px;
        }

        .post-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            margin-right: 12px;
            padding: 2px;
        }

        .avatar-inner {
            width: 100%;
            height: 100%;
            background: #eee;
            border-radius: 50%;
            border: 2px solid white;
        }

        .username {
            font-weight: 600;
            font-size: 14px;
        }

        .post-image-sim {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #efefef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #ccc;
        }

        .post-actions {
            padding: 12px 16px;
            display: flex;
            gap: 16px;
        }

        .action-icon {
            cursor: pointer;
            font-size: 24px;
            background: none;
            border: none;
            transition: transform 0.1s;
        }

        .action-icon:active {
            transform: scale(1.2);
        }

        .liked {
            color: var(--heart-red);
        }

        .post-info {
            padding: 0 16px 16px;
        }

        .likes-count {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }

        .caption {
            font-size: 14px;
            line-height: 1.4;
        }

        .caption .username {
            margin-right: 5px;
        }

        .post-time {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 8px;
            display: block;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content">
            <a href="#" class="logo">Instagram</a>
            <div class="nav-icons">
                <span>🏠</span>
            </div>
        </div>
    </nav>

    <main>
        <!-- Criar Post -->
        <div class="create-post">
            <h3>Nova Publicação</h3>
            <textarea id="postInput" placeholder="Escreva uma legenda..." rows="3"></textarea>
            <button class="btn-post" id="publishBtn" onclick="addPost()">Compartilhar</button>
        </div>

        <!-- Feed -->
        <div id="feed">
            <!-- Posts serão inseridos aqui -->
        </div>
    </main>

    <script>
        const postInput = document.getElementById('postInput');
        const feed = document.getElementById('feed');

        let posts = [
            {
                id: 1,
                user: "manus_ai",
                caption: "Explorando as possibilidades do código! 🚀 #dev #instagram",
                likes: 124,
                liked: false,
                time: "HÁ 2 HORAS",
                emoji: "🎨"
            }
        ];

        function renderPosts() {
            feed.innerHTML = '';
            posts.forEach(post => {
                const postEl = document.createElement('div');
                postEl.className = 'post';
                postEl.innerHTML = `
                    <div class="post-header">
                        <div class="avatar"><div class="avatar-inner"></div></div>
                        <span class="username">${post.user}</span>
                    </div>
                    <div class="post-image-sim">
                        ${post.emoji || '📸'}
                    </div>
                    <div class="post-actions">
                        <button class="action-icon ${post.liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                            ${post.liked ? '❤️' : '🤍'}
                        </button>
                        <button class="action-icon">💬</button>
                        <button class="action-icon">✈️</button>
                    </div>
                    <div class="post-info">
                        <span class="likes-count">${post.likes} curtidas</span>
                        <div class="caption">
                            <span class="username">${post.user}</span>
                            ${post.caption}
                        </div>
                        <span class="post-time">${post.time}</span>
                    </div>
                `;
                feed.appendChild(postEl);
            });
        }

        function addPost() {
            const text = postInput.value.trim();
            if (!text) return;

            const emojis = ['🌟', '📸', '✨', '💻', '🚀', '🔥'];
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];

            const newPost = {
                id: Date.now(),
                user: "vitor_gabriel",
                caption: text,
                likes: 0,
                liked: false,
                time: "AGORA MESMO",
                emoji: randomEmoji
            };

            posts.unshift(newPost);
            postInput.value = '';
            renderPosts();
        }

        function toggleLike(id) {
            posts = posts.map(p => {
                if (p.id === id) {
                    const liked = !p.liked;
                    return { ...p, liked, likes: liked ? p.likes + 1 : p.likes - 1 };
                }
                return p;
            });
            renderPosts();
        }

        renderPosts();
    </script>
</body>
</html>
