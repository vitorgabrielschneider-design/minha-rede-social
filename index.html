<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone</title>
    <style>
        :root {
            --header-bg: #075e54;
            --header-text: #ffffff;
            --chat-bg: #e5ddd5;
            --sent-bubble: #dcf8c6;
            --received-bubble: #ffffff;
            --text-main: #000000;
            --text-gray: #757575;
            --bg-body: #f0f2f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg-body); height: 100vh; display: flex; justify-content: center; overflow: hidden; }

        /* Container Principal (Layout de Desktop para simular Web) */
        .app-container {
            width: 100%;
            max-width: 1200px;
            height: 95vh;
            margin-top: 2.5vh;
            background: #fff;
            display: flex;
            box-shadow: 0 1px 1px 0 rgba(0,0,0,.06), 0 2px 5px 0 rgba(0,0,0,.2);
        }

        /* Barra Lateral (Lista de Conversas) */
        .sidebar {
            width: 30%;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .sidebar-header {
            height: 60px;
            background: #ededed;
            display: flex;
            align-items: center;
            padding: 0 15px;
            justify-content: space-between;
        }

        .user-avatar-sim { width: 40px; height: 40px; background: #ccc; border-radius: 50%; }

        .search-bar { padding: 10px; background: #f6f6f6; }
        .search-bar input {
            width: 100%;
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            display: flex;
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f2f2f2;
            transition: background 0.3s;
        }
        .chat-item:hover { background: #f5f5f5; }
        .chat-item.active { background: #ebebeb; }

        .chat-info { flex: 1; margin-left: 15px; }
        .chat-info-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .chat-name { font-weight: 600; font-size: 16px; }
        .chat-time { font-size: 12px; color: var(--text-gray); }
        .chat-last-msg { font-size: 14px; color: var(--text-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Área de Chat */
        .chat-area {
            width: 70%;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
            position: relative;
        }

        .chat-header {
            height: 60px;
            background: #ededed;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-left: 1px solid #ddd;
        }

        .messages-container {
            flex: 1;
            padding: 20px 50px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        .message {
            max-width: 60%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            position: relative;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }
        .message.sent { background: var(--sent-bubble); align-self: flex-end; }
        .message.received { background: var(--received-bubble); align-self: flex-start; }

        .message-time {
            font-size: 10px;
            color: var(--text-gray);
            text-align: right;
            margin-top: 4px;
        }

        /* Input de Mensagem */
        .input-area {
            height: 62px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            outline: none;
            font-size: 15px;
        }

        .send-btn { cursor: pointer; font-size: 24px; color: #51585c; }

        /* Responsividade para Mobile */
        @media (max-width: 768px) {
            .app-container { height: 100vh; margin-top: 0; }
            .sidebar { width: 100%; }
            .chat-area { display: none; width: 100%; position: absolute; top: 0; left: 0; height: 100%; z-index: 10; }
            .chat-area.active { display: flex; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-avatar-sim"></div>
                <div style="font-size: 20px; color: #51585c;">💬 ⋮</div>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Pesquisar ou começar uma nova conversa">
            </div>
            <div class="chat-list" id="chat-list">
                <!-- Conversas simuladas -->
                <div class="chat-item active" onclick="openChat('Mãe', 'received')">
                    <div class="user-avatar-sim"></div>
                    <div class="chat-info">
                        <div class="chat-info-top"><span class="chat-name">Mãe</span><span class="chat-time">10:45</span></div>
                        <p class="chat-last-msg">Já chegou em casa?</p>
                    </div>
                </div>
                <div class="chat-item" onclick="openChat('Grupo da Firma', 'received')">
                    <div class="user-avatar-sim"></div>
                    <div class="chat-info">
                        <div class="chat-info-top"><span class="chat-name">Grupo da Firma</span><span class="chat-time">09:30</span></div>
                        <p class="chat-last-msg">Reunião às 14h, pessoal!</p>
                    </div>
                </div>
                <div class="chat-item" onclick="openChat('Vitor Gabriel', 'sent')">
                    <div class="user-avatar-sim"></div>
                    <div class="chat-info">
                        <div class="chat-info-top"><span class="chat-name">Vitor Gabriel</span><span class="chat-time">Ontem</span></div>
                        <p class="chat-last-msg">O projeto está pronto!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chat-area">
            <div class="chat-header">
                <div id="mobile-back" style="display: none; cursor: pointer; margin-right: 15px;" onclick="closeChat()">⬅</div>
                <div class="user-avatar-sim" style="width: 35px; height: 35px;"></div>
                <div style="margin-left: 15px;">
                    <strong id="current-chat-name">Mãe</strong>
                    <p style="font-size: 12px; color: var(--text-gray);">visto por último hoje às 10:45</p>
                </div>
            </div>

            <div class="messages-container" id="messages-list">
                <!-- Mensagens iniciais -->
                <div class="message received">Oi, filho! Já chegou em casa?<div class="message-time">10:45</div></div>
                <div class="message sent">Oi mãe! Tô chegando agora.<div class="message-time">10:46</div></div>
            </div>

            <div class="input-area">
                <span style="font-size: 24px; cursor: pointer;">😊</span>
                <span style="font-size: 24px; cursor: pointer;">📎</span>
                <input type="text" id="msg-input" placeholder="Digite uma mensagem" onkeypress="handleKey(event)">
                <span class="send-btn" onclick="sendMsg()">➤</span>
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const messagesList = document.getElementById('messages-list');
        const msgInput = document.getElementById('msg-input');
        const chatName = document.getElementById('current-chat-name');

        function openChat(name, type) {
            chatName.innerText = name;
            messagesList.innerHTML = ''; // Limpa mensagens anteriores
            
            // Simula mensagens baseadas no contato
            if (name === 'Mãe') {
                addMessage('Oi, filho! Já chegou em casa?', 'received');
                addMessage('Oi mãe! Tô chegando agora.', 'sent');
            } else if (name === 'Grupo da Firma') {
                addMessage('Reunião às 14h, pessoal!', 'received');
            } else {
                addMessage('O projeto está pronto!', 'sent');
            }

            // Ativa no mobile
            if (window.innerWidth <= 768) {
                chatArea.classList.add('active');
                document.getElementById('mobile-back').style.display = 'block';
            }
        }

        function closeChat() {
            chatArea.classList.remove('active');
        }

        function sendMsg() {
            const text = msgInput.value.trim();
            if (!text) return;

            addMessage(text, 'sent');
            msgInput.value = '';
            messagesList.scrollTop = messagesList.scrollHeight;

            // Simulação de resposta automática
            setTimeout(() => {
                addMessage('Beleza! Entendido. 👍', 'received');
                messagesList.scrollTop = messagesList.scrollHeight;
            }, 1000);
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            const now = new Date();
            const time = now.getHours() + ':' + now.getMinutes().toString().padStart(2, '0');
            div.innerHTML = `${text}<div class="message-time">${time}</div>`;
            messagesList.appendChild(div);
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendMsg();
        }

        // Ajuste inicial para mobile
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                chatArea.classList.remove('active');
                document.getElementById('mobile-back').style.display = 'none';
            }
        });
    </script>
</body>
</html>
