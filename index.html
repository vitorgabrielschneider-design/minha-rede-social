<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <style>
        :root {
            --bg: #fafafa;
            --white: #ffffff;
            --text: #262626;
            --border: #dbdbdb;
            --blue: #0095f6;
            --gray: #8e8e8e;
            --heart: #ed4956;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }

        body { background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        /* Navbar */
        nav.top-nav {
            background-color: var(--white);
            border-bottom: 1px solid var(--border);
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-content {
            width: 100%;
            max-width: 975px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo { font-size: 24px; font-weight: bold; font-style: italic; cursor: pointer; }

        .nav-icons { display: flex; gap: 22px; font-size: 22px; cursor: pointer; }

        /* Main Content */
        main {
            width: 100%;
            max-width: 600px;
            margin: 30px auto;
            flex: 1;
            padding-bottom: 70px;
        }

        /* Feed Section */
        .post {
            background-color: var(--white);
            border: 1px solid var(--border);
            border-radius: 3px;
            margin-bottom: 24px;
        }

        .post-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
        }

        /* Sem foto de perfil, apenas o nome */
        .post-user-info { display: flex; align-items: center; }

        .post-image {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: #efefef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .post-actions {
            padding: 12px 16px;
            display: flex;
            gap: 16px;
            font-size: 24px;
        }

        .action-btn { cursor: pointer; transition: transform 0.1s; }
        .action-btn:active { transform: scale(1.2); }
        .liked { color: var(--heart); }

        .post-details { padding: 0 16px 16px; font-size: 14px; }
        .likes-count { font-weight: 600; margin-bottom: 8px; display: block; }
        .caption { line-height: 1.4; }
        .caption strong { margin-right: 5px; }

        /* Reels Section */
        .reels-container {
            display: none;
            background: #000;
            height: calc(100vh - 60px);
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel-card {
            height: 100%;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reel-video-sim { width: 100%; height: 100%; object-fit: cover; }
        .reel-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #fff;
            z-index: 10;
        }

        /* Chat Section */
        .chat-container {
            display: none;
            background: var(--white);
            border: 1px solid var(--border);
            height: 500px;
            border-radius: 4px;
        }
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            font-weight: 600;
        }
        .chat-messages {
            height: 380px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .bubble {
            padding: 8px 12px;
            border-radius: 20px;
            max-width: 70%;
            font-size: 14px;
        }
        .bubble.sent { background: var(--blue); color: #fff; align-self: flex-end; }
        .bubble.received { background: #efefef; align-self: flex-start; }

        .chat-input-area {
            padding: 10px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }
        .chat-input-area input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 15px;
            outline: none;
        }

        /* Profile Section */
        .profile-container {
            display: none;
            padding: 20px;
            text-align: center;
        }
        .profile-name-big { font-size: 28px; font-weight: 300; margin-bottom: 20px; }
        .edit-profile-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Bottom Nav (Mobile style) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 50px;
            background: var(--white);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 24px;
            z-index: 1000;
        }

        .hidden { display: none !important; }
        .active-tab { color: var(--blue); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-content">
            <div class="logo" onclick="showTab('feed')">Instagram</div>
            <div class="nav-icons">
                <span onclick="showTab('chat')">📩</span>
            </div>
        </div>
    </nav>

    <main id="main-content">
        <!-- TAB: FEED -->
        <section id="tab-feed">
            <div id="feed-list"></div>
        </section>

        <!-- TAB: REELS -->
        <section id="tab-reels" class="reels-container">
            <div class="reel-card" style="background: #1a1a1a;">
                <div style="font-size: 100px;">🎞️</div>
                <div class="reel-overlay"><strong>@vitor_gabriel</strong><p>Explorando o novo Reels! 🔥</p></div>
            </div>
            <div class="reel-card" style="background: #2c3e50;">
                <div style="font-size: 100px;">✨</div>
                <div class="reel-overlay"><strong>@vitor_gabriel</strong><p>Codando com estilo. 💻</p></div>
            </div>
        </section>

        <!-- TAB: CHAT -->
        <section id="tab-chat" class="chat-container">
            <div class="chat-header">Direct</div>
            <div class="chat-messages" id="chat-msgs">
                <div class="bubble received">Olá! Tudo bem?</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Escreva uma mensagem...">
                <button onclick="sendMsg()" style="border:none; background:none; color:var(--blue); font-weight:600; cursor:pointer;">Enviar</button>
            </div>
        </section>

        <!-- TAB: PROFILE -->
        <section id="tab-profile" class="profile-container">
            <div class="profile-name-big" id="display-name">vitor_gabriel</div>
            <div style="margin-bottom: 30px;">
                <button class="edit-profile-btn" onclick="editProfile()">Editar Perfil</button>
            </div>
            <div id="edit-area" class="hidden">
                <input type="text" id="new-name" placeholder="Novo nome de usuário" style="padding: 8px; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 10px;"><br>
                <button onclick="saveName()" style="background: var(--blue); color: #fff; border: none; padding: 8px 16px; border-radius: 4px; font-weight: 600; cursor: pointer;">Salvar</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <span onclick="showTab('feed')">🏠</span>
        <span onclick="showTab('reels')">🎞️</span>
        <span onclick="showTab('profile')">👤</span>
    </nav>

    <script>
        const posts = [
            { user: 'ana_clara', emoji: '🌟', caption: 'Que dia maravilhoso! ✨', likes: 120 },
            { user: 'joao_dev', emoji: '💻', caption: 'Novo projeto saindo do forno. 🚀', likes: 85 }
        ];

        function initFeed() {
            const list = document.getElementById('feed-list');
            list.innerHTML = '';
            posts.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = `
                    <div class="post-header">
                        <div class="post-user-info">
                            <span>${p.user}</span>
                        </div>
                    </div>
                    <div class="post-image">${p.emoji}</div>
                    <div class="post-actions">
                        <span class="action-btn" onclick="toggleLike(this)">🤍</span>
                        <span class="action-btn">💬</span>
                        <span class="action-btn">✈️</span>
                    </div>
                    <div class="post-details">
                        <span class="likes-count">${p.likes} curtidas</span>
                        <div class="caption"><strong>${p.user}</strong> ${p.caption}</div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function showTab(tab) {
            const sections = ['feed', 'reels', 'chat', 'profile'];
            sections.forEach(s => {
                const el = document.getElementById('tab-' + s);
                if (el) el.style.display = 'none';
            });

            const activeEl = document.getElementById('tab-' + tab);
            if (activeEl) {
                if (tab === 'reels') activeEl.style.display = 'block';
                else if (tab === 'chat') activeEl.style.display = 'block';
                else activeEl.style.display = 'block';
            }

            // Estilo da Navbar Superior
            const nav = document.querySelector('.top-nav');
            if (tab === 'reels') {
                nav.style.background = '#000';
                nav.style.color = '#fff';
                nav.style.borderBottom = 'none';
            } else {
                nav.style.background = '#fff';
                nav.style.color = '#000';
                nav.style.borderBottom = '1px solid var(--border)';
            }
        }

        function toggleLike(btn) {
            btn.classList.toggle('liked');
            btn.innerHTML = btn.classList.contains('liked') ? '❤️' : '🤍';
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            if (!input.value) return;
            const msgs = document.getElementById('chat-msgs');
            const div = document.createElement('div');
            div.className = 'bubble sent';
            div.innerText = input.value;
            msgs.appendChild(div);
            input.value = '';
            msgs.scrollTop = msgs.scrollHeight;
        }

        function editProfile() {
            document.getElementById('edit-area').classList.toggle('hidden');
        }

        function saveName() {
            const name = document.getElementById('new-name').value;
            if (name) {
                document.getElementById('display-name').innerText = name;
                document.getElementById('new-name').value = '';
                editProfile();
            }
        }

        window.onload = () => {
            initFeed();
            showTab('feed');
        };
    </script>
</body>
</html>
