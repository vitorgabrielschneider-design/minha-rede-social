<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTGUIA - Full Experience</title>
    <style>
        :root {
            --bg: #fafafa;
            --app-bg: #ffffff;
            --text: #262626;
            --border: #dbdbdb;
            --blue: #0095f6;
            --gray: #8e8e8e;
            --story-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }

        body { background-color: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        .phone-container {
            width: 375px; height: 667px; background-color: var(--app-bg);
            border: 8px solid #333; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            position: relative; display: flex; flex-direction: column; overflow: hidden;
        }

        header {
            height: 50px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; background: #fff; flex-shrink: 0; z-index: 10;
        }
        .logo { font-size: 20px; font-weight: bold; color: var(--text); }

        #app-body { flex: 1; overflow-y: auto; position: relative; scrollbar-width: none; }
        #app-body::-webkit-scrollbar { display: none; }

        /* Sections */
        .section { height: 100%; display: flex; flex-direction: column; }
        .hidden { display: none !important; }

        /* Stories & Feed */
        .stories-bar { display: flex; padding: 10px; gap: 12px; overflow-x: auto; border-bottom: 1px solid var(--border); }
        .story-item { display: flex; flex-direction: column; align-items: center; min-width: 65px; cursor: pointer; }
        .ring { width: 56px; height: 56px; border-radius: 50%; background: var(--story-gradient); padding: 2px; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; background-size: cover; border: 2px solid #fff; }
        .post { border-bottom: 1px solid var(--border); }
        .post-header { padding: 8px 12px; display: flex; align-items: center; font-size: 13px; }
        .mini-avatar { width: 28px; height: 28px; border-radius: 50%; margin-right: 8px; background-size: cover; }
        .post-img { width: 100%; }

        /* Reels */
        .reels-view { background: #000; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel-card { height: 100%; width: 100%; scroll-snap-align: start; position: relative; }
        video.reel-video { width: 100%; height: 100%; object-fit: cover; }
        .reel-overlay { position: absolute; bottom: 20px; left: 15px; color: #fff; font-size: 13px; z-index: 5; }

        /* Chat */
        .chat-list { padding: 10px; }
        .chat-item { display: flex; align-items: center; padding: 10px; cursor: pointer; border-radius: 8px; }
        .chat-item:active { background: #f0f0f0; }
        .chat-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 100; display: flex; flex-direction: column; }
        .chat-header { height: 50px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 8px 12px; border-radius: 18px; max-width: 80%; font-size: 14px; }
        .bubble.sent { background: var(--blue); color: #fff; align-self: flex-end; }
        .bubble.received { background: #efefef; align-self: flex-start; }
        .chat-input { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input input { flex: 1; border: 1px solid var(--border); border-radius: 20px; padding: 8px 15px; outline: none; }

        /* Profile */
        .profile-view { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .profile-avatar-big { width: 100px; height: 100px; border-radius: 50%; background-size: cover; margin-bottom: 15px; border: 1px solid var(--border); cursor: pointer; }
        .profile-name { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
        .edit-form { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .edit-form input { padding: 10px; border: 1px solid var(--border); border-radius: 5px; }
        .save-btn { background: var(--blue); color: #fff; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Bottom Nav */
        nav.bottom-nav { height: 50px; background: #fff; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; flex-shrink: 0; }
        .nav-icon { font-size: 20px; cursor: pointer; }

        /* Story Viewer */
        #story-viewer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .story-progress { display: flex; gap: 4px; padding: 8px; position: absolute; top: 0; width: 100%; }
        .progress-bar { height: 2px; background: rgba(255,255,255,0.3); flex: 1; border-radius: 1px; overflow: hidden; }
        .progress-fill { height: 100%; background: #fff; width: 0%; transition: width linear; }
    </style>
</head>
<body>

    <div class="phone-container">
        <header id="main-header">
            <div class="logo">VTGUIA</div>
            <div style="font-size: 18px; cursor: pointer;" onclick="showSection('chat')">📩</div>
        </header>

        <main id="app-body">
            <!-- HOME -->
            <section id="sec-home" class="section">
                <div class="stories-bar" id="stories-list"></div>
                <div id="feed-list" style="overflow-y: auto;"></div>
            </section>

            <!-- REELS -->
            <section id="sec-reels" class="section hidden reels-view">
                <div class="reel-card"><video class="reel-video" src="https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-light-12859-large.mp4" loop muted autoplay></video><div class="reel-overlay"><strong>@cyber_vibe</strong><p>Neon nights ⚡</p></div></div>
                <div class="reel-card"><video class="reel-video" src="https://assets.mixkit.co/videos/preview/mixkit-tree-with-yellow-leaves-low-angle-shot-1579-large.mp4" loop muted autoplay></video><div class="reel-overlay"><strong>@nature_vt</strong><p>Outono mágico 🍂</p></div></div>
            </section>

            <!-- CHAT LIST -->
            <section id="sec-chat" class="section hidden">
                <div class="chat-header"><span onclick="showSection('home')" style="cursor:pointer; margin-right:15px;">⬅️</span><strong>Mensagens</strong></div>
                <div class="chat-list" id="chat-list"></div>
                <!-- Chat Screen (Nested) -->
                <div id="chat-screen" class="chat-screen hidden">
                    <div class="chat-header"><span onclick="closeChat()" style="cursor:pointer; margin-right:15px;">⬅️</span><strong id="chat-user-title"></strong></div>
                    <div class="chat-messages" id="chat-msgs"></div>
                    <div class="chat-input"><input type="text" id="msg-input" placeholder="Mensagem..."><button onclick="sendMessage()" style="border:none; background:none; color:var(--blue); font-weight:bold;">Enviar</button></div>
                </div>
            </section>

            <!-- PROFILE -->
            <section id="sec-profile" class="section hidden profile-view">
                <div class="profile-avatar-big" id="my-avatar" style="background-image: url('https://images.unsplash.com/photo-153571501da13a22ce55605e1a455d04?w=200&h=200&fit=crop')"></div>
                <div class="profile-name" id="my-name-display">Vitor Gabriel</div>
                <div class="edit-form">
                    <input type="text" id="edit-name" placeholder="Novo nome">
                    <input type="text" id="edit-photo" placeholder="URL da foto">
                    <button class="save-btn" onclick="saveProfile()">Salvar Alterações</button>
                </div>
            </section>

            <!-- STORY VIEWER -->
            <div id="story-viewer">
                <div class="story-progress"><div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div></div>
                <div class="story-content"><img id="story-img" src=""></div>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-icon" onclick="showSection('home')">🏠</div>
            <div class="nav-icon" onclick="showSection('reels')">🎞️</div>
            <div class="nav-icon" onclick="showSection('profile')">👤</div>
        </nav>
    </div>

    <script>
        const users = [
            { name: 'ana_travel', img: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&h=200&fit=crop', story: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&h=1000&fit=crop' },
            { name: 'joao_tech', img: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200&h=200&fit=crop', story: 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=600&h=1000&fit=crop' }
        ];

        function initApp() {
            // Render Stories
            const sList = document.getElementById('stories-list');
            users.forEach((u, i) => {
                const div = document.createElement('div');
                div.className = 'story-item';
                div.onclick = () => openStory(i);
                div.innerHTML = `<div class="ring"><div class="avatar" style="background-image:url('${u.img}')"></div></div><span>${u.name}</span>`;
                sList.appendChild(div);
            });

            // Render Feed
            const fList = document.getElementById('feed-list');
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = `<div class="post-header"><div class="mini-avatar" style="background-image:url('${u.img}')"></div><strong>${u.name}</strong></div>
                                 <img src="${u.story}" class="post-img">`;
                fList.appendChild(div);
            });

            // Render Chats
            const cList = document.getElementById('chat-list');
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.onclick = () => openChat(u.name);
                div.innerHTML = `<div class="mini-avatar" style="background-image:url('${u.img}'); width:45px; height:45px;"></div>
                                 <div><strong>${u.name}</strong><p style="font-size:12px; color:var(--gray);">Olá! Tudo bem?</p></div>`;
                cList.appendChild(div);
            });
        }

        function showSection(sec) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + sec).classList.remove('hidden');
            document.getElementById('main-header').style.display = (sec === 'reels' || sec === 'chat') ? 'none' : 'flex';
        }

        // Chat Logic
        function openChat(name) {
            document.getElementById('chat-user-title').innerText = name;
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('chat-msgs').innerHTML = `<div class="bubble received">Oi! Vi suas fotos novas, ficaram ótimas!</div>`;
        }
        function closeChat() { document.getElementById('chat-screen').classList.add('hidden'); }
        function sendMessage() {
            const input = document.getElementById('msg-input');
            if (!input.value) return;
            const div = document.createElement('div');
            div.className = 'bubble sent';
            div.innerText = input.value;
            document.getElementById('chat-msgs').appendChild(div);
            input.value = '';
            document.getElementById('chat-msgs').scrollTop = document.getElementById('chat-msgs').scrollHeight;
        }

        // Profile Logic
        function saveProfile() {
            const name = document.getElementById('edit-name').value;
            const photo = document.getElementById('edit-photo').value;
            if (name) {
                document.getElementById('my-name-display').innerText = name;
                document.getElementById('edit-name').value = '';
            }
            if (photo) {
                document.getElementById('my-avatar').style.backgroundImage = `url('${photo}')`;
                document.getElementById('edit-photo').value = '';
            }
            alert('Perfil atualizado!');
        }

        // Story Logic
        let storyTimer;
        function openStory(index) {
            const viewer = document.getElementById('story-viewer');
            const fill = document.getElementById('prog-fill');
            document.getElementById('story-img').src = users[index].story;
            viewer.style.display = 'flex';
            fill.style.width = '0%';
            setTimeout(() => { fill.style.transitionDuration = '3s'; fill.style.width = '100%'; }, 50);
            storyTimer = setTimeout(() => viewer.style.display = 'none', 3050);
        }

        window.onload = initApp;
    </script>
</body>
</html>
