<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Pro Clone</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #262626;
            --border: #dbdbdb;
            --blue: #0095f6;
            --gray: #8e8e8e;
            --story-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar */
        header {
            height: 50px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            background: #fff;
            z-index: 100;
        }

        .logo { font-weight: bold; font-size: 20px; }

        /* Main Content Area */
        #main-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 60px; /* Space for bottom nav */
        }

        /* Stories Section */
        .stories-container {
            display: flex;
            padding: 10px;
            gap: 15px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
            scrollbar-width: none;
        }
        .stories-container::-webkit-scrollbar { display: none; }

        .story {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
        }

        .story-ring {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--story-gradient);
            padding: 2px;
            margin-bottom: 5px;
        }

        .story-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #eee;
            border: 2px solid #fff;
        }

        .story-user { font-size: 11px; color: var(--text); }

        /* Feed Section */
        .post { border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .post-header { padding: 10px; display: flex; align-items: center; }
        .post-avatar { width: 32px; height: 32px; border-radius: 50%; background: #eee; margin-right: 10px; }
        .post-img { width: 100%; aspect-ratio: 1/1; background: #fafafa; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .post-actions { padding: 10px; display: flex; gap: 15px; font-size: 24px; }
        .post-info { padding: 0 10px 10px; font-size: 14px; }

        /* Reels Mode (Full Screen) */
        .reels-mode { background: #000; color: #fff; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reels-mode .reel { height: calc(100vh - 50px); scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; font-size: 100px; }
        .reels-mode .reel-info { position: absolute; bottom: 20px; left: 20px; z-index: 10; }

        /* Messages Section */
        .messages-container { padding: 20px; }
        .chat-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .chat-avatar { width: 50px; height: 50px; border-radius: 50%; background: #eee; margin-right: 15px; }
        .chat-info h4 { font-size: 14px; }
        .chat-info p { font-size: 13px; color: var(--gray); }

        /* Bottom Nav */
        nav.bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 50px;
            border-top: 1px solid var(--border);
            background: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 24px;
        }

        .nav-item { cursor: pointer; color: var(--text); }
        .nav-item.active { color: var(--blue); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header id="app-header">
        <div class="logo">Instagram</div>
        <div style="font-size: 20px; cursor: pointer;" onclick="showTab('messages')">📩</div>
    </header>

    <div id="main-content">
        <!-- TAB: HOME -->
        <div id="tab-home">
            <div class="stories-container">
                <div class="story"><div class="story-ring"><div class="story-avatar"></div></div><span class="story-user">Seu story</span></div>
                <div class="story"><div class="story-ring"><div class="story-avatar"></div></div><span class="story-user">ana_clara</span></div>
                <div class="story"><div class="story-ring"><div class="story-avatar"></div></div><span class="story-user">joao_dev</span></div>
                <div class="story"><div class="story-ring"><div class="story-avatar"></div></div><span class="story-user">marcos_99</span></div>
                <div class="story"><div class="story-ring"><div class="story-avatar"></div></div><span class="story-user">bia_arts</span></div>
            </div>
            <div id="feed">
                <!-- Posts will be here -->
            </div>
        </div>

        <!-- TAB: REELS -->
        <div id="tab-reels" class="hidden reels-mode">
            <div class="reel" style="background: #1a1a1a;">🎬</div>
            <div class="reel" style="background: #2c3e50;">🔥</div>
            <div class="reel" style="background: #8e44ad;">✨</div>
        </div>

        <!-- TAB: MESSAGES -->
        <div id="tab-messages" class="hidden">
            <div class="messages-container">
                <h2 style="margin-bottom: 20px;">Mensagens</h2>
                <div class="chat-item"><div class="chat-avatar"></div><div class="chat-info"><h4>Ana Clara</h4><p>Enviou uma mensagem agora</p></div></div>
                <div class="chat-item"><div class="chat-avatar"></div><div class="chat-info"><h4>João Dev</h4><p>Visto há 2h</p></div></div>
                <div class="chat-item"><div class="chat-avatar"></div><div class="chat-info"><h4>Bia Arts</h4><p>Olá! Tudo bem?</p></div></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showTab('home')">🏠</div>
        <div class="nav-item" onclick="alert('Explorar em breve!')">🔍</div>
        <div class="nav-item" onclick="showTab('reels')">🎞️</div>
        <div class="nav-item" onclick="alert('Loja em breve!')">🛍️</div>
        <div class="nav-item" onclick="alert('Perfil em breve!')">👤</div>
    </nav>

    <script>
        function showTab(tabName) {
            // Hide all tabs
            document.getElementById('tab-home').classList.add('hidden');
            document.getElementById('tab-reels').classList.add('hidden');
            document.getElementById('tab-messages').classList.add('hidden');
            
            // Show selected tab
            document.getElementById('tab-' + tabName).classList.remove('hidden');

            // Handle header and background
            const header = document.getElementById('app-header');
            const content = document.getElementById('main-content');
            
            if (tabName === 'reels') {
                header.style.background = '#000';
                header.style.color = '#fff';
                header.style.borderBottom = 'none';
                content.style.background = '#000';
            } else {
                header.style.background = '#fff';
                header.style.color = '#000';
                header.style.borderBottom = '1px solid #dbdbdb';
                content.style.background = '#fff';
            }

            // Update Nav Active State
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            // (Simple logic: just visual feedback for the demo)
        }

        // Render Initial Feed
        const feed = document.getElementById('feed');
        const posts = [
            { user: 'ana_clara', emoji: '📸', caption: 'Dia incrível na praia! ☀️' },
            { user: 'joao_dev', emoji: '💻', caption: 'Codando o dia todo... ☕' }
        ];

        posts.forEach(post => {
            const div = document.createElement('div');
            div.className = 'post';
            div.innerHTML = `
                <div class="post-header"><div class="post-avatar"></div><strong>${post.user}</strong></div>
                <div class="post-img">${post.emoji}</div>
                <div class="post-actions"><span>❤️</span><span>💬</span><span>✈️</span></div>
                <div class="post-info"><strong>${post.user}</strong> ${post.caption}</div>
            `;
            feed.appendChild(div);
        });
    </script>
</body>
</html>
