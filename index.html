<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Video Edition</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #262626;
            --border: #dbdbdb;
            --blue: #0095f6;
            --gray: #8e8e8e;
            --heart: #ed4956;
            --story-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }

        body { background-color: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header {
            height: 60px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; background: #fff; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: bold; font-style: italic; }

        /* Main Content */
        #app-body { flex: 1; overflow-y: auto; padding-bottom: 60px; }

        /* Stories Bar */
        .stories-bar {
            display: flex; padding: 15px 10px; gap: 15px; overflow-x: auto;
            border-bottom: 1px solid var(--border); scrollbar-width: none;
        }
        .stories-bar::-webkit-scrollbar { display: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; min-width: 75px; cursor: pointer; }
        .ring {
            width: 66px; height: 66px; border-radius: 50%; background: var(--story-gradient);
            padding: 2px; margin-bottom: 5px;
        }
        .avatar {
            width: 100%; height: 100%; border-radius: 50%; background-size: cover;
            background-position: center; border: 2px solid #fff;
        }

        /* Feed Posts */
        .post { border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .post-header { padding: 12px; display: flex; align-items: center; }
        .mini-avatar { width: 32px; height: 32px; border-radius: 50%; margin-right: 10px; background-size: cover; }
        .post-img { width: 100%; }

        /* Reels View */
        .reels-view { background: #000; color: #fff; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel-card {
            height: calc(100vh - 60px); width: 100%; scroll-snap-align: start;
            position: relative; overflow: hidden;
        }
        video.reel-video {
            width: 100%; height: 100%; object-fit: cover;
        }
        .reel-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8)); z-index: 5;
        }

        /* Story Fullscreen Viewer */
        #story-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: none; flex-direction: column;
        }
        .story-progress {
            display: flex; gap: 5px; padding: 10px; position: absolute; top: 0; width: 100%;
        }
        .progress-bar { height: 2px; background: rgba(255,255,255,0.3); flex: 1; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #fff; width: 0%; transition: width linear; }
        .story-header { display: flex; align-items: center; padding: 20px 10px; color: #fff; z-index: 10; }
        .story-content { flex: 1; display: flex; align-items: center; justify-content: center; }
        .story-content img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Bottom Nav */
        nav.bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: #fff; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-icon { font-size: 26px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="logo">Instagram</div>
        <div style="font-size: 22px; cursor: pointer;">📩</div>
    </header>

    <main id="app-body">
        <!-- HOME -->
        <section id="sec-home">
            <div class="stories-bar" id="stories-list"></div>
            <div id="feed-list"></div>
        </section>

        <!-- REELS -->
        <section id="sec-reels" class="hidden reels-view"></section>
    </main>

    <!-- STORY VIEWER -->
    <div id="story-viewer">
        <div class="story-progress"><div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div></div>
        <div class="story-header">
            <div class="mini-avatar" id="story-user-img" style="width:40px; height:40px;"></div>
            <strong id="story-username" style="margin-left:10px;"></strong>
            <span style="margin-left:auto; cursor:pointer; font-size:24px;" onclick="closeStory()">×</span>
        </div>
        <div class="story-content">
            <img id="story-img" src="">
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-icon" onclick="showSection('home')">🏠</div>
        <div class="nav-icon" onclick="showSection('reels')">🎞️</div>
        <div class="nav-icon">👤</div>
    </nav>

    <script>
        const users = [
            { name: 'ana_travel', img: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&h=200&fit=crop', story: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&h=1000&fit=crop' },
            { name: 'joao_tech', img: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200&h=200&fit=crop', story: 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=600&h=1000&fit=crop' },
            { name: 'luna_arts', img: 'https://images.unsplash.com/photo-1517841905240-472988babdf9?w=200&h=200&fit=crop', story: 'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=600&h=1000&fit=crop' }
        ];

        const reelsVideos = [
            'https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-light-12859-large.mp4',
            'https://assets.mixkit.co/videos/preview/mixkit-tree-with-yellow-leaves-low-angle-shot-1579-large.mp4'
        ];

        function initApp() {
            // Stories
            const sList = document.getElementById('stories-list');
            users.forEach((u, i) => {
                const div = document.createElement('div');
                div.className = 'story-item';
                div.onclick = () => openStory(i);
                div.innerHTML = `<div class="ring"><div class="avatar" style="background-image:url('${u.img}')"></div></div><span>${u.name}</span>`;
                sList.appendChild(div);
            });

            // Feed
            const fList = document.getElementById('feed-list');
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = `<div class="post-header"><div class="mini-avatar" style="background-image:url('${u.img}')"></div><strong>${u.name}</strong></div>
                                 <img src="${u.story}" class="post-img">`;
                fList.appendChild(div);
            });

            // Reels
            const rList = document.getElementById('sec-reels');
            reelsVideos.forEach(v => {
                const div = document.createElement('div');
                div.className = 'reel-card';
                div.innerHTML = `<video class="reel-video" src="${v}" loop muted autoplay></video>
                                 <div class="reel-overlay"><strong>@reels_trend</strong><p>Confira esse vídeo incrível! 🔥</p></div>`;
                rList.appendChild(div);
            });
        }

        function showSection(sec) {
            document.getElementById('sec-home').classList.toggle('hidden', sec !== 'home');
            document.getElementById('sec-reels').classList.toggle('hidden', sec !== 'reels');
            document.getElementById('main-header').style.display = sec === 'reels' ? 'none' : 'flex';
        }

        // Story Logic
        let storyTimer;
        function openStory(index) {
            const viewer = document.getElementById('story-viewer');
            const fill = document.getElementById('prog-fill');
            const user = users[index];
            
            document.getElementById('story-username').innerText = user.name;
            document.getElementById('story-user-img').style.backgroundImage = `url('${user.img}')`;
            document.getElementById('story-img').src = user.story;
            
            viewer.style.display = 'flex';
            fill.style.width = '0%';
            
            setTimeout(() => {
                fill.style.transitionDuration = '3s';
                fill.style.width = '100%';
            }, 50);

            storyTimer = setTimeout(closeStory, 3050);
        }

        function closeStory() {
            document.getElementById('story-viewer').style.display = 'none';
            document.getElementById('prog-fill').style.transitionDuration = '0s';
            clearTimeout(storyTimer);
        }

        window.onload = initApp;
    </script>
</body>
</html>
