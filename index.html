<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Reels Clone</title>
    <style>
        /* Estilos CSS para o Instagram Reels */
        :root {
            --white: #ffffff;
            --black: #000000;
            --gray: #8e8e8e;
            --heart: #ff3040;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            background-color: var(--black);
            overflow: hidden; /* Evita scroll lateral */
        }

        /* Container Principal - Reels Container */
        .reels-container {
            height: 100vh;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none; /* Firefox */
        }

        .reels-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        /* Cada Vídeo (Reel) */
        .reel {
            height: 100vh;
            width: 100%;
            position: relative;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%), #1a1a1a;
        }

        /* Simulação de vídeo (Fundo colorido) */
        .video-sim {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: rgba(255,255,255,0.2);
        }

        /* Overlay de Conteúdo */
        .reel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            z-index: 10;
            color: var(--white);
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .user-info {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #eee;
            margin-right: 10px;
            border: 1px solid var(--white);
        }

        .username {
            font-weight: 600;
            font-size: 14px;
            margin-right: 10px;
        }

        .follow-btn {
            background: transparent;
            border: 1px solid var(--white);
            color: var(--white);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .caption {
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.4;
            max-width: 80%;
        }

        .audio-info {
            display: flex;
            align-items: center;
            font-size: 13px;
        }

        .audio-icon {
            margin-right: 8px;
        }

        /* Barra Lateral de Ações */
        .side-actions {
            position: absolute;
            right: 10px;
            bottom: 80px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            color: var(--white);
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .icon {
            font-size: 28px;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .count {
            font-size: 12px;
            font-weight: 600;
        }

        .liked .icon {
            color: var(--heart);
        }

        /* Botão Flutuante para Criar (Simulação) */
        .add-reel-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        /* Modal Simples para Novo Post */
        #postModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #262626;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 12px;
            color: white;
        }

        textarea {
            width: 100%;
            background: #363636;
            border: none;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            resize: none;
        }

        .publish-btn {
            width: 100%;
            background: #0095f6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button class="add-reel-btn" onclick="openModal()">+</button>

    <div class="reels-container" id="reelsContainer">
        <!-- Os Reels serão carregados aqui -->
    </div>

    <!-- Modal para criar post -->
    <div id="postModal">
        <div class="modal-content">
            <h3>Novo Reel</h3>
            <textarea id="postInput" placeholder="No que você está pensando?" rows="4"></textarea>
            <button class="publish-btn" onclick="addReel()">Publicar</button>
            <button style="background:transparent; color: #8e8e8e; border:none; margin-top:10px; cursor:pointer; width:100%;" onclick="closeModal()">Cancelar</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('reelsContainer');
        const modal = document.getElementById('postModal');
        const input = document.getElementById('postInput');

        let reels = [
            {
                id: 1,
                user: "manus_ai",
                caption: "Transformando ideias em código em segundos! ✨ #reels #coding #ai",
                likes: "12.5K",
                comments: "342",
                audio: "Áudio original - manus_ai",
                color: "#2c3e50",
                emoji: "🤖",
                liked: false
            },
            {
                id: 2,
                user: "vitor_gabriel",
                caption: "O futuro do design é agora. Confira esse novo layout estilo Reels! 🚀",
                likes: "8.2K",
                comments: "156",
                audio: "Som de tendência - Viral",
                color: "#8e44ad",
                emoji: "✨",
                liked: true
            }
        ];

        function renderReels() {
            container.innerHTML = '';
            reels.forEach(reel => {
                const reelDiv = document.createElement('div');
                reelDiv.className = 'reel';
                reelDiv.style.backgroundColor = reel.color;
                
                reelDiv.innerHTML = `
                    <div class="video-sim">${reel.emoji}</div>
                    
                    <div class="side-actions">
                        <div class="action-item ${reel.liked ? 'liked' : ''}" onclick="toggleLike(${reel.id})">
                            <span class="icon">${reel.liked ? '❤️' : '🤍'}</span>
                            <span class="count">${reel.likes}</span>
                        </div>
                        <div class="action-item">
                            <span class="icon">💬</span>
                            <span class="count">${reel.comments}</span>
                        </div>
                        <div class="action-item">
                            <span class="icon">✈️</span>
                        </div>
                        <div class="action-item">
                            <span class="icon">...</span>
                        </div>
                    </div>

                    <div class="reel-overlay">
                        <div class="user-info">
                            <div class="avatar"></div>
                            <span class="username">${reel.user}</span>
                            <button class="follow-btn">Seguir</button>
                        </div>
                        <div class="caption">${reel.caption}</div>
                        <div class="audio-info">
                            <span class="audio-icon">🎵</span>
                            <span>${reel.audio}</span>
                        </div>
                    </div>
                `;
                container.appendChild(reelDiv);
            });
        }

        function toggleLike(id) {
            reels = reels.map(r => {
                if (r.id === id) {
                    return { ...r, liked: !r.liked };
                }
                return r;
            });
            renderReels();
        }

        function openModal() { modal.style.display = 'flex'; }
        function closeModal() { modal.style.display = 'none'; }

        function addReel() {
            const text = input.value.trim();
            if (!text) return;

            const colors = ['#e67e22', '#27ae60', '#2980b9', '#f1c40f', '#c0392b'];
            const emojis = ['🌟', '🔥', '🎨', '📸', '⚡'];

            const newReel = {
                id: Date.now(),
                user: "vitor_gabriel",
                caption: text,
                likes: "0",
                comments: "0",
                audio: "Áudio original - vitor_gabriel",
                color: colors[Math.floor(Math.random() * colors.length)],
                emoji: emojis[Math.floor(Math.random() * emojis.length)],
                liked: false
            };

            reels.unshift(newReel);
            input.value = '';
            closeModal();
            renderReels();
            container.scrollTop = 0;
        }

        renderReels();
    </script>
</body>
</html>
