<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTGUIA</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #262626;
            --secondary-text: #8e8e8e;
            --border: #dbdbdb;
            --blue: #0095f6;
            --red: #ed4956;
            --insta-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body { background-color: #fafafa; display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        .app-container {
            width: 100%; max-width: 450px; height: 100vh; background: var(--bg);
            display: flex; flex-direction: column; position: relative;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        header {
            height: 60px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; background: #fff; z-index: 100;
        }
        .logo { font-size: 24px; font-weight: bold; font-family: 'Arial Black', sans-serif; letter-spacing: -1px; }
        .header-icons { display: flex; gap: 20px; font-size: 22px; cursor: pointer; }

        main { flex: 1; overflow-y: auto; scrollbar-width: none; }
        main::-webkit-scrollbar { display: none; }

        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Stories Bar */
        .stories-bar { display: flex; padding: 12px 8px; gap: 12px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .stories-bar::-webkit-scrollbar { display: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; min-width: 75px; cursor: pointer; }
        .story-ring { 
            width: 66px; height: 66px; border-radius: 50%; 
            background: var(--insta-gradient); padding: 2px; 
            display: flex; justify-content: center; align-items: center;
        }
        .story-avatar { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #fff; background-size: cover; background-position: center; }
        .story-name { font-size: 11px; margin-top: 4px; color: var(--text); text-align: center; }

        /* Story Viewer */
        #story-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: none; flex-direction: column;
        }
        .story-header { position: absolute; top: 15px; left: 15px; display: flex; align-items: center; gap: 10px; color: #fff; z-index: 10; }
        .story-progress { position: absolute; top: 5px; width: 96%; left: 2%; height: 2px; background: rgba(255,255,255,0.3); }
        .story-progress-fill { height: 100%; background: #fff; width: 0%; transition: width linear; }
        .story-content { flex: 1; display: flex; align-items: center; justify-content: center; }
        .story-content img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .story-footer { padding: 20px; display: flex; align-items: center; gap: 15px; }
        .story-input { flex: 1; background: transparent; border: 1px solid #fff; border-radius: 20px; padding: 8px 15px; color: #fff; outline: none; }
        .story-like-btn { font-size: 24px; color: #fff; cursor: pointer; transition: transform 0.2s; }
        .story-like-btn.liked { color: var(--red); transform: scale(1.2); }

        /* Post */
        .post { border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .post-header { display: flex; align-items: center; justify-content: space-between; padding: 12px; }
        .post-user { display: flex; align-items: center; gap: 10px; }
        .post-avatar { width: 32px; height: 32px; border-radius: 50%; background-size: cover; }
        .post-username { font-size: 14px; font-weight: 600; }
        .post-img-container { width: 100%; aspect-ratio: 1/1; background: #efefef; overflow: hidden; position: relative; }
        .post-img { width: 100%; height: 100%; object-fit: cover; }
        .post-actions { display: flex; padding: 12px; gap: 16px; font-size: 24px; }
        .post-action-icon { cursor: pointer; transition: transform 0.1s; }
        .post-action-icon:active { transform: scale(1.2); }
        .liked { color: var(--red); }
        .post-likes { padding: 0 12px; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .post-caption { padding: 0 12px 12px; font-size: 14px; line-height: 1.4; }

        /* Reels */
        .reels-container { height: 100%; background: #000; overflow-y: scroll; snap-type: y mandatory; }
        .reel-item { height: 100%; width: 100%; snap-align: start; position: relative; }
        .reel-video-sim { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 100px; }
        .reel-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.7)); color: #fff; }
        .reel-actions-side { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; color: #fff; align-items: center; }

        /* Bottom Nav */
        nav { height: 50px; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; background: #fff; z-index: 100; }
        .nav-icon { font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <header id="app-header">
            <div class="logo">VTGUIA</div>
            <div class="header-icons">
                <span onclick="alert('Notificações em breve!')">❤️</span>
                <span onclick="showSection('chat')">📩</span>
            </div>
        </header>

        <main id="main-content">
            <section id="sec-home" class="section active">
                <div class="stories-bar" id="stories-container"></div>
                <div id="feed-container"></div>
            </section>

            <section id="sec-reels" class="section">
                <div class="reels-container" id="reels-container"></div>
            </section>

            <section id="sec-chat" class="section">
                <div style="padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px;">
                    <span onclick="showSection('home')" style="cursor:pointer; font-size: 20px;">⬅️</span>
                    <h2 style="font-size: 18px;">Mensagens</h2>
                </div>
                <div id="chat-list" style="padding: 10px;"></div>
            </section>

            <section id="sec-profile" class="section">
                <!-- Profile content same as before -->
                <div style="padding: 20px; text-align: center;">
                    <div style="width: 80px; height: 80px; border-radius: 50%; background: #eee; margin: 0 auto 10px; background-image: url('https://images.unsplash.com/photo-153571501da13a22ce55605e1a455d04?w=200'); background-size: cover;"></div>
                    <h3>Vitor Gabriel</h3>
                    <p>VTGUIA Creator</p>
                </div>
            </section>
        </main>

        <nav>
            <div class="nav-icon" onclick="showSection('home')">🏠</div>
            <div class="nav-icon" onclick="showSection('reels')">🎞️</div>
            <div class="nav-icon" onclick="showSection('profile')">👤</div>
        </nav>
    </div>

    <!-- Story Viewer Modal -->
    <div id="story-viewer">
        <div class="story-progress"><div class="story-progress-fill" id="story-fill"></div></div>
        <div class="story-header">
            <div id="story-user-img" style="width:32px; height:32px; border-radius:50%; background-size:cover;"></div>
            <strong id="story-user-name"></strong>
            <span style="margin-left: auto; cursor: pointer; font-size: 20px;" onclick="closeStory()">✕</span>
        </div>
        <div class="story-content">
            <img id="story-img" src="">
        </div>
        <div class="story-footer">
            <input type="text" class="story-input" placeholder="Enviar mensagem...">
            <span class="story-like-btn" id="story-like-icon" onclick="toggleStoryLike()">❤️</span>
        </div>
    </div>

    <script>
        const data = {
            users: [
                { id: 1, name: 'ana_clara', img: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150', post: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600', caption: 'Paraíso! 🌴', likes: 123, liked: false, storyLiked: false },
                { id: 2, name: 'marcos_dev', img: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150', post: 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=600', caption: 'Foco no código. 💻', likes: 85, liked: false, storyLiked: false }
            ]
        };

        let currentStoryUser = null;

        function init() {
            renderStories();
            renderFeed();
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
        }

        function renderStories() {
            const container = document.getElementById('stories-container');
            container.innerHTML = '';
            data.users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'story-item';
                div.onclick = () => openStory(u);
                div.innerHTML = `
                    <div class="story-ring"><div class="story-avatar" style="background-image: url('${u.img}')"></div></div>
                    <span class="story-name">${u.name}</span>
                `;
                container.appendChild(div);
            });
        }

        function openStory(user) {
            currentStoryUser = user;
            const viewer = document.getElementById('story-viewer');
            const fill = document.getElementById('story-fill');
            const likeIcon = document.getElementById('story-like-icon');
            
            document.getElementById('story-user-img').style.backgroundImage = `url(${user.img})`;
            document.getElementById('story-user-name').innerText = user.name;
            document.getElementById('story-img').src = user.post;
            
            likeIcon.className = user.storyLiked ? 'story-like-btn liked' : 'story-like-btn';
            
            viewer.style.display = 'flex';
            fill.style.width = '0%';
            setTimeout(() => { fill.style.transition = 'width 3s linear'; fill.style.width = '100%'; }, 50);
            
            window.storyTimeout = setTimeout(closeStory, 3050);
        }

        function closeStory() {
            document.getElementById('story-viewer').style.display = 'none';
            document.getElementById('story-fill').style.transition = 'none';
            clearTimeout(window.storyTimeout);
        }

        function toggleStoryLike() {
            currentStoryUser.storyLiked = !currentStoryUser.storyLiked;
            const likeIcon = document.getElementById('story-like-icon');
            likeIcon.className = currentStoryUser.storyLiked ? 'story-like-btn liked' : 'story-like-btn';
        }

        function renderFeed() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            data.users.forEach(u => {
                const postDiv = document.createElement('div');
                postDiv.className = 'post';
                postDiv.innerHTML = `
                    <div class="post-header">
                        <div class="post-user">
                            <div class="post-avatar" style="background-image: url('${u.img}')"></div>
                            <span class="post-username">${u.name}</span>
                        </div>
                        <span>•••</span>
                    </div>
                    <div class="post-img-container" ondblclick="likePost(${u.id})">
                        <img src="${u.post}" class="post-img">
                    </div>
                    <div class="post-actions">
                        <span class="post-action-icon ${u.liked ? 'liked' : ''}" onclick="likePost(${u.id})">${u.liked ? '❤️' : '🤍'}</span>
                        <span class="post-action-icon">💬</span>
                        <span class="post-action-icon">✈️</span>
                    </div>
                    <div class="post-likes" id="likes-${u.id}">${u.likes} curtidas</div>
                    <div class="post-caption"><strong>${u.name}</strong> ${u.caption}</div>
                `;
                container.appendChild(postDiv);
            });
        }

        function likePost(id) {
            const user = data.users.find(u => u.id === id);
            user.liked = !user.liked;
            user.likes += user.liked ? 1 : -1;
            renderFeed();
        }

        window.onload = init;
    </script>
</body>
</html>
